name: Hangzhou Night Shift

on:
  schedule:
    - cron: '30 1 * * *'    # 北京时间 09:30
    - cron: '30 3 * * *'    # 北京时间 11:30
    - cron: '30 5 * * *'    # 北京时间 13:30
    - cron: '30 7 * * *'    # 北京时间 15:30
    - cron: '30 9 * * *'    # 北京时间 17:30
    - cron: '30 11 * * *'   # 北京时间 19:30
    - cron: '30 13 * * *'   # 北京时间 21:30
    - cron: '30 15 * * *'   # 北京时间 23:30
    - cron: '30 17 * * *'   # 北京时间 01:30
    - cron: '30 19 * * *'   # 北京时间 03:30
    - cron: '30 21 * * *'   # 北京时间 05:30
    - cron: '30 23 * * *'   # 北京时间 07:30
  workflow_dispatch:
    inputs:
      auto_curator:
        description: '是否启用 data-curator 自动补数（true/false）'
        required: false
        default: 'false'

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  hangzhou-night-shift:
    runs-on: ubuntu-latest
    env:
      TZ: Asia/Shanghai
      AUTO_CURATOR: ${{ github.event.inputs.auto_curator || vars.AUTO_DATA_CURATOR || 'true' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run QA Scan And Main Plan
        run: |
          mkdir -p reports/night-shift/hangzhou
          bash scripts/run_hangzhou_night_shift.sh

      - name: Upload Night Shift Artifact
        uses: actions/upload-artifact@v4
        with:
          name: hangzhou-night-shift-${{ github.run_id }}
          path: reports/night-shift/hangzhou

      - name: QA Reviewer Nightly Summary
        run: |
          python3 backend/tools/write_hangzhou_qa_review.py \
            --qa reports/night-shift/hangzhou/latest-qa.json \
            --out reports/night-shift/hangzhou/latest-qa-review.md

      - name: Main Orchestrator Plan
        run: |
          python3 backend/tools/write_hangzhou_orchestrator.py \
            --plan-json reports/night-shift/hangzhou/latest-main-plan.json \
            --out reports/night-shift/hangzhou/latest-orchestrator.md

      - name: Data Curator Auto Shift
        if: ${{ env.AUTO_CURATOR == 'true' }}
        run: |
          python3 backend/tools/run_hangzhou_auto_curator.py \
            --qa-before reports/night-shift/hangzhou/latest-qa.json \
            --report-out reports/night-shift/hangzhou/latest-curator-report.md \
            --qa-after reports/night-shift/hangzhou/latest-qa-post.json

      - name: Re-run QA After Curator
        if: ${{ env.AUTO_CURATOR == 'true' }}
        run: |
          test -f reports/night-shift/hangzhou/latest-qa-post.json

      - name: Build Human Summary
        run: |
          python3 - <<'PY'
          import json
          from datetime import datetime
          from pathlib import Path

          root = Path("reports/night-shift/hangzhou")
          qa_path = root / "latest-qa-post.json"
          if not qa_path.exists():
              qa_path = root / "latest-qa.json"
          qa = json.loads(qa_path.read_text(encoding="utf-8"))

          plan_path = root / "latest-main-plan.md"
          plan = plan_path.read_text(encoding="utf-8").strip() if plan_path.exists() else "主Agent计划待生成"
          qa_review_path = root / "latest-qa-review.md"
          qa_review = qa_review_path.read_text(encoding="utf-8").strip() if qa_review_path.exists() else ""
          orchestrator_path = root / "latest-orchestrator.md"
          orchestrator = orchestrator_path.read_text(encoding="utf-8").strip() if orchestrator_path.exists() else ""
          curator_path = root / "latest-curator-report.md"
          curator_report = curator_path.read_text(encoding="utf-8").strip() if curator_path.exists() else ""

          run_time = datetime.now().strftime("%Y-%m-%d %H:%M")
          lines = [
              f"# 杭州自动值守总结 - {run_time}",
              "",
              "## 本轮结果",
              f"- 学校总数：{qa.get('schoolCount', 0)}",
              f"- P0 缺失：{qa.get('missingBasicsCount', 0)}",
              f"- 民办招生覆盖：{qa.get('privateAdmissionReadyCount', 0)}/{qa.get('privateSchoolCount', 0)}",
              f"- 民办学费覆盖：{qa.get('privateTuitionReadyCount', 0)}/{qa.get('privateSchoolCount', 0)}",
              f"- 画像缺失：{qa.get('profileMissingCount', 0)}",
              "",
              "## 本轮做了什么",
              "- 重建了杭州 seed",
              "- 跑了 QA 检查并生成主Agent计划",
          ]

          if (root / "latest-qa-post.json").exists():
              lines.append("- 若开启 AUTO_DATA_CURATOR，也已执行 data-curator 并回跑 QA")

          lines.extend(
              [
                  "",
                  "## 本轮风险",
                  f"- 基础字段阻断：{'有' if qa.get('missingBasicsCount', 0) > 0 or qa.get('duplicateKeys') else '无'}",
                  f"- 招生覆盖缺口：{max(qa.get('privateSchoolCount', 0) - qa.get('privateAdmissionReadyCount', 0), 0)} 所",
                  f"- 学费覆盖缺口：{max(qa.get('privateSchoolCount', 0) - qa.get('privateTuitionReadyCount', 0), 0)} 所",
                  "",
                  "## 下一步",
                  "- 继续按主Agent计划推进最高优先级任务",
                  "",
                  "## 主Agent计划",
                  plan,
              ]
          )

          if orchestrator:
              lines.extend(["", "## 主Agent补充说明", orchestrator])
          if qa_review:
              lines.extend(["", "## QA Reviewer 结论", qa_review])
          if curator_report:
              lines.extend(["", "## Data Curator 执行报告", curator_report])

          (root / "latest-summary.md").write_text("\n".join(lines) + "\n", encoding="utf-8")
          PY

      - name: Create Daily Sync Issue
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const path = 'reports/night-shift/hangzhou/latest-main-plan.md';
            const qaPath = 'reports/night-shift/hangzhou/latest-qa.json';
            const summaryPath = 'reports/night-shift/hangzhou/latest-summary.md';
            const qa = JSON.parse(fs.readFileSync(qaPath, 'utf8'));
            const plan = fs.existsSync(path) ? fs.readFileSync(path, 'utf8') : '夜班计划文件待生成';
            const summary = fs.existsSync(summaryPath) ? fs.readFileSync(summaryPath, 'utf8') : '本轮总结反馈待生成';
            const today = new Date().toLocaleDateString('zh-CN', { timeZone: 'Asia/Shanghai' });
            const title = `[Night Shift] 杭州数据值守 ${today}`;
            const body =
              `## 杭州自动值守已执行\n\n` +
              `- 学校总数：${qa.schoolCount}\n` +
              `- P0 缺失：${qa.missingBasicsCount}\n` +
              `- 民办招生覆盖：${qa.privateAdmissionReadyCount}/${qa.privateSchoolCount}\n` +
              `- 民办学费覆盖：${qa.privateTuitionReadyCount}/${qa.privateSchoolCount}\n` +
              `- 画像缺失：${qa.profileMissingCount}\n\n` +
              `### 本轮总结反馈\n\n${summary}\n\n` +
              `### 主Agent日计划\n\n${plan}\n\n` +
              `> 说明：这是定时任务自动生成的总结反馈与日报。`;

            const existing = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'night-shift-report',
              per_page: 50
            });

            const match = existing.data.find(it => it.title === title);
            if (match) {
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: match.number,
                body
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body,
                labels: ['night-shift-report']
              });
            }
