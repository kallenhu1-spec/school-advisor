<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>学校数据管理台</title>
  <style>
    :root { --bg:#f4f6fb; --card:#fff; --line:#e5e7eb; --text:#1f2937; --muted:#6b7280; --blue:#2563eb; --green:#16a34a; --orange:#ea580c; --gray:#6b7280; }
    * { box-sizing: border-box; }
    body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", sans-serif; background: var(--bg); color: var(--text); }
    .wrap { max-width: 1320px; margin: 0 auto; padding: 16px; }
    h1 { font-size: 22px; margin: 0 0 8px; }
    .sub { color: var(--muted); font-size: 13px; margin-bottom: 12px; }
    .card { background: var(--card); border: 1px solid var(--line); border-radius: 12px; padding: 12px; margin-bottom: 12px; }
    .row { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; margin-bottom: 8px; }
    .grow { flex: 1; min-width: 180px; }
    input, select, textarea { border: 1px solid #d1d5db; border-radius: 8px; min-height: 34px; padding: 6px 10px; font-size: 13px; }
    input, select { width: 100%; background: #fff; }
    textarea { width: 100%; min-height: 130px; font-family: ui-monospace, SFMono-Regular, Menlo, monospace; }
    button { border: 0; border-radius: 8px; background: var(--blue); color: #fff; height: 34px; padding: 0 12px; cursor: pointer; font-size: 13px; }
    button.green { background: var(--green); }
    button.orange { background: var(--orange); }
    button.gray { background: var(--gray); }
    .status { color: var(--muted); font-size: 12px; margin: 4px 0 8px; }
    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    th, td { border-bottom: 1px solid #edf0f4; text-align: left; padding: 8px; vertical-align: top; }
    th { background: #f9fafb; color: #374151; }
    tr.clickable:hover td { background: #f8fbff; cursor: pointer; }
    .tag { display:inline-block; padding:2px 8px; border-radius:999px; font-size:11px; border:1px solid transparent; }
    .tag.pub { background:#f0fdf4; color:#15803d; border-color:#bbf7d0; }
    .tag.pri { background:#eff6ff; color:#1d4ed8; border-color:#bfdbfe; }
    .tag.t1 { background:#fef2f2; color:#dc2626; border-color:#fecaca; }
    .tag.t2 { background:#fff7ed; color:#c2410c; border-color:#fed7aa; }
    .tag.t3 { background:#f7fee7; color:#4d7c0f; border-color:#d9f99d; }
    .tag.official { background:#f0fdf4; color:#15803d; border-color:#bbf7d0; }
    .tag.candidate { background:#fff7ed; color:#c2410c; border-color:#fed7aa; }
    .tag.missing { background:#fef2f2; color:#dc2626; border-color:#fecaca; }
    .tag.not_applicable { background:#eff6ff; color:#1d4ed8; border-color:#bfdbfe; }
    .tier-edit { width: 86px; min-height: 30px; font-size: 12px; }
    .name-btn { border:0; background:transparent; color:#2563eb; cursor:pointer; padding:0; text-align:left; font-size:13px; }
    .name-btn:hover { text-decoration: underline; }
    .tier-mark { color:#ea580c; font-size: 11px; margin-left: 4px; }
    .row-delete td { background:#fff1f2 !important; color:#9f1239; }
    .del-btn { height:30px; font-size:12px; border-radius:7px; padding:0 10px; }
    .del-btn.warn { background:#dc2626; }
    .detail { border:1px solid var(--line); border-radius:10px; padding:10px; background:#fafcff; }
    .kv { margin-bottom: 6px; font-size: 13px; }
    .kv b { color:#374151; }
    .grid2 { display:grid; gap:12px; grid-template-columns: 1fr 1fr; }
    @media (max-width: 980px){ .grid2 { grid-template-columns: 1fr; } }
    .mono { font-family: ui-monospace, SFMono-Regular, Menlo, monospace; font-size: 12px; }
    pre { margin: 0; white-space: pre-wrap; word-break: break-word; }
    .publish-wrap { border: 1px solid var(--line); background: #f8fafc; border-radius: 10px; padding: 10px; margin: 8px 0 10px; display: none; }
    .publish-title { font-size: 13px; color: #374151; margin-bottom: 8px; font-weight: 600; }
    .publish-steps { display: grid; grid-template-columns: 1fr; gap: 6px; }
    .publish-step { display: flex; align-items: center; gap: 8px; font-size: 12px; color: #4b5563; }
    .publish-dot { width: 16px; height: 16px; border-radius: 999px; border: 1px solid #cbd5e1; display: inline-flex; align-items: center; justify-content: center; font-size: 11px; }
    .publish-step.success .publish-dot { background: #16a34a; border-color: #16a34a; color: #fff; }
    .publish-step.running .publish-dot { background: #2563eb; border-color: #2563eb; color: #fff; }
    .publish-step.failed .publish-dot { background: #dc2626; border-color: #dc2626; color: #fff; }
    .publish-log { margin-top: 8px; color: #6b7280; white-space: pre-wrap; }
    .lvl { display:inline-block; padding:2px 6px; border-radius:999px; font-size:11px; border:1px solid transparent; }
    .lvl.official { background:#f0fdf4; color:#15803d; border-color:#bbf7d0; }
    .lvl.verified { background:#eff6ff; color:#1d4ed8; border-color:#bfdbfe; }
    .lvl.community { background:#fff7ed; color:#c2410c; border-color:#fed7aa; }
    .lvl.ai-draft { background:#fef2f2; color:#dc2626; border-color:#fecaca; }
    .pager { display:flex; align-items:center; justify-content:flex-end; gap:8px; margin-top:10px; }
    .pager-info { color:#6b7280; font-size:12px; min-width:140px; text-align:center; }
    .drawer-mask { position: fixed; inset: 0; background: rgba(15, 23, 42, 0.35); z-index: 30; display:none; }
    .drawer-mask.open { display:block; }
    .drawer { position: fixed; top: 0; right: 0; height: 100vh; width: min(860px, 96vw); background: #fff; border-left: 1px solid #e5e7eb; box-shadow: -8px 0 30px rgba(0,0,0,.12); z-index: 40; transform: translateX(100%); transition: transform .24s ease-out; display:flex; flex-direction:column; }
    .drawer.open { transform: translateX(0); }
    .drawer-head { padding: 12px; border-bottom: 1px solid #e5e7eb; display:flex; justify-content:space-between; align-items:center; }
    .drawer-body { padding: 12px; overflow:auto; }
    .source-matrix td, .source-matrix th { font-size: 12px; }
    .source-matrix th { white-space: nowrap; }
    .src-links { margin-top: 6px; display:flex; gap:6px; flex-wrap:wrap; }
    .src-link { display:inline-block; border:1px solid #cbd5e1; background:#f8fafc; color:#1d4ed8; border-radius:999px; padding:2px 8px; text-decoration:none; font-size:11px; }
    .src-empty { color:#9ca3af; font-size:11px; }
    .src-note { color:#6b7280; font-size:11px; margin-top:4px; }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>学校数据管理台（本地）</h1>
    <div class="sub">学校列表筛选、学校详情查看、证据抓取与发布</div>

    <div class="card">
      <div class="row">
        <div class="grow"><input id="q" placeholder="搜索学校名" /></div>
        <div class="grow"><select id="f-district"><option value="">全部区域</option></select></div>
        <div class="grow"><select id="f-tier"><option value="">全部梯队</option><option value="T1">T1</option><option value="T2">T2</option><option value="T3">T3</option></select></div>
        <div class="grow"><select id="f-type"><option value="">全部类型</option><option value="pub">公办</option><option value="pri">民办</option></select></div>
        <button id="btn-filter">筛选</button>
        <button id="btn-reset" class="gray">重置</button>
        <button id="btn-clear-tier-edits" class="gray">清空暂存变更</button>
        <button id="btn-push-tier" class="green">数据推送前台</button>
        <button id="btn-publish-online" class="orange">发布到线上</button>
      </div>
      <div class="status" id="school-status">加载中...</div>
      <div id="publish-wrap" class="publish-wrap">
        <div class="publish-title">线上发布进度</div>
        <div id="publish-steps" class="publish-steps"></div>
        <div id="publish-log" class="publish-log mono"></div>
      </div>
      <table>
        <thead>
          <tr>
            <th style="width:12%">区域</th>
            <th style="width:22%">学校名</th>
            <th style="width:9%">类型</th>
            <th style="width:11%">梯队（可调）</th>
            <th style="width:10%">2025录取数</th>
            <th style="width:10%">2025最大摇号数</th>
            <th style="width:8%">来源</th>
            <th style="width:6%">操作</th>
          </tr>
        </thead>
        <tbody id="school-body"></tbody>
      </table>
      <div class="pager">
        <button id="btn-prev-page" class="gray">上一页</button>
        <div class="pager-info" id="page-info">第 1 / 1 页</div>
        <button id="btn-next-page" class="gray">下一页</button>
      </div>
    </div>
  </div>
  <div id="detail-mask" class="drawer-mask"></div>
  <aside id="detail-drawer" class="drawer" aria-hidden="true">
    <div class="drawer-head">
      <b>学校详情</b>
      <button id="btn-close-drawer" class="gray">关闭</button>
    </div>
    <div class="drawer-body">
      <div id="school-detail" class="detail">尚未选择学校</div>
      <div style="height:8px"></div>
      <div class="row">
        <button id="btn-evidence-collect" class="orange">抓取该校证据</button>
        <input id="evidence-top" style="width:90px" value="3" />
        <div class="grow"><input id="evidence-queries" placeholder="可选：自定义扩展词（用 ; 分隔）" /></div>
      </div>
      <div class="status" id="evidence-status">证据语料：请选择学校后查看</div>
      <table>
        <thead>
          <tr>
            <th style="width:18%">查询词</th>
            <th style="width:30%">标题</th>
            <th style="width:20%">来源类型</th>
            <th style="width:20%">采集时间</th>
            <th style="width:12%">链接</th>
          </tr>
        </thead>
        <tbody id="evidence-body"></tbody>
      </table>
    </div>
  </aside>

  <script>
    var API = location.origin;
    var cacheSchools = [];
    var currentPage = 1;
    var pageSize = 30;
    var pendingTierUpdates = {};
    var pendingRenameUpdates = {};
    var pendingDeleteNames = {};
    var selectedSchoolName = '';
    var publishTaskId = '';
    var publishTimer = null;
    var PUBLISH_URL_KEY = 'publish_cloudflare_url';
    var PUBLISH_TOKEN_KEY = 'publish_cloudflare_token';

    function qs(id){ return document.getElementById(id); }
    function j(v){ return JSON.stringify(v, null, 2); }

    function districtName(code){
      var map = {pudong:"浦东",minhang:"闵行",xuhui:"徐汇",changning:"长宁",jingan:"静安",huangpu:"黄浦",putuo:"普陀",yangpu:"杨浦",hongkou:"虹口",jiading:"嘉定",qingpu:"青浦"};
      return map[code] || code || "-";
    }
    function typeName(t){ return t === "pri" ? "民办" : "公办"; }

    function esc(s){ return String(s == null ? "" : s).replace(/</g, "&lt;").replace(/>/g, "&gt;"); }
    function levelLabel(level){
      var lv = String(level || 'ai-draft');
      var map = {official:'官方', verified:'已核实', community:'社区', 'ai-draft':'AI草稿'};
      return '<span class="lvl ' + esc(lv) + '">' + (map[lv] || lv) + '</span>';
    }
    function targetLevel(field){
      if(field === 'enrollment' || field === 'rate') return 'official';
      if(field === 'reputation' || field === 'philosophy') return 'verified';
      return 'verified';
    }
    function fmtValue(v){
      if(Array.isArray(v)) return v.length ? v.join(' | ') : '-';
      if(v == null || v === '') return '-';
      if(typeof v === 'object') return j(v);
      return String(v);
    }
    function renderLinksCell(url, label){
      if(!url) return '<div class="src-empty">来源链接待补充</div>';
      return '<div class="src-links"><a class="src-link" href="' + esc(url) + '" target="_blank" rel="noopener noreferrer">' + esc(label || '查看来源') + '</a></div>';
    }
    function splitByMode(items){
      var arr = Array.isArray(items) ? items : [];
      return {
        evidence: arr.filter(function(x){ return (x && x.mode) === 'evidence'; }),
        lead: arr.filter(function(x){ return (x && x.mode) !== 'evidence'; })
      };
    }
    function renderGroupedSourceTitle(title, items){
      return '<div class="kv"><b>' + esc(title) + '</b></div>' + (!items.length ? '<div class="src-empty">暂无</div>' : '');
    }
    function renderSourcesSection(sources){
      var src = sources && typeof sources === 'object' ? sources : {};
      var summary = src.summary || {};
      var schoolSources = Array.isArray(src.schoolSources) ? src.schoolSources : [];
      var fieldSources = Array.isArray(src.fieldSources) ? src.fieldSources : [];
      var evidenceSources = Array.isArray(src.evidenceSources) ? src.evidenceSources : [];
      var schoolGroups = splitByMode(schoolSources);
      var fieldGroups = splitByMode(fieldSources);
      var html = '<hr style="border:none;border-top:1px solid #e5e7eb;margin:10px 0">';
      html += '<div class="kv"><b>来源总览</b></div>';
      html += '<div class="status">学校级来源 ' + esc(summary.schoolSourceCount || 0) + ' 条，字段级来源 ' + esc(summary.fieldSourceCount || 0) + ' 条，证据库 ' + esc(summary.evidenceCount || 0) + ' 条。真实证据与检索入口已分开展示。</div>';

      html += renderGroupedSourceTitle('学校级真实证据', schoolGroups.evidence);
      if(schoolGroups.evidence.length){
        html += '<table class="source-matrix"><thead><tr><th style="width:18%">标题</th><th style="width:18%">级别</th><th style="width:18%">来源类型</th><th style="width:18%">出处</th><th style="width:28%">链接</th></tr></thead><tbody>';
        schoolGroups.evidence.forEach(function(it){
          html += '<tr>'
            + '<td><b>' + esc(it.title || '-') + '</b>' + ((it.note || '') ? '<div class="src-note">' + esc(it.note) + '</div>' : '') + '</td>'
            + '<td>' + levelLabel(it.level || 'ai-draft') + '</td>'
            + '<td>' + esc(it.sourceType || '-') + '</td>'
            + '<td>' + esc(it.origin || '-') + '</td>'
            + '<td>' + renderLinksCell(it.url, '打开来源') + '</td>'
            + '</tr>';
        });
        html += '</tbody></table>';
      }

      html += '<div style="height:8px"></div>';
      html += renderGroupedSourceTitle('学校级检索入口', schoolGroups.lead);
      if(schoolGroups.lead.length){
        html += '<table class="source-matrix"><thead><tr><th style="width:18%">标题</th><th style="width:18%">级别</th><th style="width:18%">来源类型</th><th style="width:18%">出处</th><th style="width:28%">链接</th></tr></thead><tbody>';
        schoolGroups.lead.forEach(function(it){
          html += '<tr>'
            + '<td><b>' + esc(it.title || '-') + '</b>' + ((it.note || '') ? '<div class="src-note">' + esc(it.note) + '</div>' : '') + '</td>'
            + '<td>' + levelLabel(it.level || 'ai-draft') + '</td>'
            + '<td>' + esc(it.sourceType || '-') + '</td>'
            + '<td>' + esc(it.origin || '-') + '</td>'
            + '<td>' + renderLinksCell(it.url, '打开入口') + '</td>'
            + '</tr>';
        });
        html += '</tbody></table>';
      }

      html += '<div style="height:8px"></div>';
      html += renderGroupedSourceTitle('字段级真实证据', fieldGroups.evidence);
      if(fieldGroups.evidence.length){
        html += '<table class="source-matrix"><thead><tr><th style="width:14%">字段</th><th style="width:20%">值</th><th style="width:18%">current/target</th><th style="width:20%">出处</th><th style="width:28%">链接</th></tr></thead><tbody>';
        fieldGroups.evidence.forEach(function(it){
          html += '<tr>'
            + '<td><b>' + esc(it.fieldLabel || '-') + '</b><div class="src-note">' + esc(it.category || '-') + ' / ' + esc(it.fieldKey || '-') + '</div></td>'
            + '<td>' + esc(fmtValue(it.value)) + '</td>'
            + '<td>' + levelLabel(it.currentLevel || 'ai-draft') + '<div class="src-note">target: ' + esc(it.targetLevel || '-') + '</div></td>'
            + '<td>' + esc(it.origin || '-') + '<div class="src-note">' + esc(it.method || '-') + '</div></td>'
            + '<td>' + renderLinksCell(it.url, it.linkLabel || '打开来源') + '</td>'
            + '</tr>';
        });
        html += '</tbody></table>';
      }

      html += '<div style="height:8px"></div>';
      html += renderGroupedSourceTitle('字段级检索入口', fieldGroups.lead);
      if(fieldGroups.lead.length){
        html += '<table class="source-matrix"><thead><tr><th style="width:14%">字段</th><th style="width:20%">值</th><th style="width:18%">current/target</th><th style="width:20%">出处</th><th style="width:28%">链接</th></tr></thead><tbody>';
        fieldGroups.lead.forEach(function(it){
          html += '<tr>'
            + '<td><b>' + esc(it.fieldLabel || '-') + '</b><div class="src-note">' + esc(it.category || '-') + ' / ' + esc(it.fieldKey || '-') + '</div></td>'
            + '<td>' + esc(fmtValue(it.value)) + '</td>'
            + '<td>' + levelLabel(it.currentLevel || 'ai-draft') + '<div class="src-note">target: ' + esc(it.targetLevel || '-') + '</div></td>'
            + '<td>' + esc(it.origin || '-') + '<div class="src-note">' + esc(it.method || '-') + '</div></td>'
            + '<td>' + renderLinksCell(it.url, it.linkLabel || '打开入口') + '</td>'
            + '</tr>';
        });
        html += '</tbody></table>';
      }

      if(evidenceSources.length){
        html += '<div style="height:8px"></div><div class="kv"><b>证据库来源</b></div>';
        html += '<table class="source-matrix"><thead><tr><th style="width:18%">标题</th><th style="width:15%">查询词</th><th style="width:14%">来源类型</th><th style="width:15%">采集时间</th><th style="width:38%">链接</th></tr></thead><tbody>';
        evidenceSources.forEach(function(it){
          html += '<tr>'
            + '<td><b>' + esc(it.title || '-') + '</b>' + ((it.snippet || '') ? '<div class="src-note">' + esc(it.snippet) + '</div>' : '') + '</td>'
            + '<td>' + esc(it.queryText || '-') + '</td>'
            + '<td>' + esc(it.sourceType || '-') + '</td>'
            + '<td>' + esc(it.collectedAt || '-') + '</td>'
            + '<td>' + renderLinksCell(it.url, '打开证据') + '</td>'
            + '</tr>';
        });
        html += '</tbody></table>';
      }
      return html;
    }
    function openDrawer(){
      qs('detail-mask').classList.add('open');
      qs('detail-drawer').classList.add('open');
      qs('detail-drawer').setAttribute('aria-hidden', 'false');
    }
    function closeDrawer(){
      qs('detail-mask').classList.remove('open');
      qs('detail-drawer').classList.remove('open');
      qs('detail-drawer').setAttribute('aria-hidden', 'true');
    }
    function getPublishUrl(){
      try{
        return (localStorage.getItem(PUBLISH_URL_KEY) || '').trim() || 'https://school-advisor.pages.dev/api/admin/bootstrap';
      }catch(e){
        return 'https://school-advisor.pages.dev/api/admin/bootstrap';
      }
    }
    function getPublishToken(){
      try{ return (localStorage.getItem(PUBLISH_TOKEN_KEY) || '').trim(); }catch(e){ return ''; }
    }
    function savePublishConfig(url, token){
      try{
        localStorage.setItem(PUBLISH_URL_KEY, (url || '').trim());
        if(token) localStorage.setItem(PUBLISH_TOKEN_KEY, token.trim());
      }catch(e){}
    }

    function pendingCount(){
      return Object.keys(pendingTierUpdates).length;
    }
    function pendingRenameCount(){
      return Object.keys(pendingRenameUpdates).length;
    }
    function pendingDeleteCount(){
      return Object.keys(pendingDeleteNames).length;
    }

    function updateSchoolStatus(total){
      var p = pendingCount();
      var r = pendingRenameCount();
      var d = pendingDeleteCount();
      var coverage = qs('school-status').dataset.coverage || '';
      qs('school-status').textContent = '共 ' + total + ' 所学校；待推送梯队修改 ' + p + ' 条；待改名 ' + r + ' 条；待删除 ' + d + ' 条' + (coverage ? '；' + coverage : '');
    }

    function setPendingTier(name, oldTier, newTier){
      if(!name) return;
      if(!newTier || newTier === oldTier){
        delete pendingTierUpdates[name];
      } else {
        pendingTierUpdates[name] = newTier;
      }
      updateSchoolStatus(cacheSchools.length);
    }
    function togglePendingDelete(name){
      if(!name) return;
      if(pendingDeleteNames[name]){
        delete pendingDeleteNames[name];
      }else{
        pendingDeleteNames[name] = true;
      }
      updateSchoolStatus(cacheSchools.length);
    }
    function setPendingRename(oldName, newName){
      if(!oldName) return;
      newName = (newName || '').trim();
      if(!newName || newName === oldName){
        delete pendingRenameUpdates[oldName];
      }else{
        pendingRenameUpdates[oldName] = newName;
      }
      updateSchoolStatus(cacheSchools.length);
    }

    async function loadSchools(){
      var q = encodeURIComponent(qs('q').value.trim());
      var district = encodeURIComponent(qs('f-district').value);
      var tier = encodeURIComponent(qs('f-tier').value);
      var type = encodeURIComponent(qs('f-type').value);
      var url = API + '/api/admin/schools?q=' + q + '&district=' + district + '&tier=' + tier + '&type=' + type;
      var data = await (await fetch(url)).json();
      cacheSchools = data.items || [];
      var cov = data.admissionCoverage || {};
      qs('school-status').dataset.coverage = '录取数覆盖：官方 ' + (cov.official || 0) + '，候选 ' + (cov.candidate || 0) + '，缺失 ' + (cov.missing || 0) + '，公办不适用 ' + (cov.notApplicable || 0);
      currentPage = 1;
      renderDistrictOptions(cacheSchools);
      renderSchoolPage();
    }

    function renderSchoolPage(){
      var total = cacheSchools.length;
      var totalPages = Math.max(1, Math.ceil(total / pageSize));
      if(currentPage > totalPages) currentPage = totalPages;
      if(currentPage < 1) currentPage = 1;
      var start = (currentPage - 1) * pageSize;
      var end = Math.min(start + pageSize, total);
      var pageRows = cacheSchools.slice(start, end);
      var tb = qs('school-body');
      tb.innerHTML = '';
      pageRows.forEach(function(s){
        var isPendingDelete = !!pendingDeleteNames[s.name];
        var tr = document.createElement('tr');
        var tdDistrict = document.createElement('td');

    async function collectSchoolEvidence(){

        return;
      }

      qs('evidence-status').textContent = '正在抓取证据，请稍候...';
      var res = await fetch(API + '/api/admin/school-evidence/collect', {
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body: JSON.stringify({schoolName: school, top: top, queries: queries})
      });
      var data = await res.json();
      if(!res.ok || !data.ok){
        qs('evidence-status').textContent = '抓取失败：' + (data.error || '未知错误');
        return;
      }
      var one = (data.results || [])[0] || {};

    async function uploadXlsx(){
      var file = qs('excel-file').files[0];
      if(!file){ qs('excel-status').textContent = '请先选择 .xlsx 文件'; return; }
      var mode = qs('excel-mode').value;
      var ab = await file.arrayBuffer();
      var binary = '';
      var bytes = new Uint8Array(ab);
      for(var i = 0; i < bytes.length; i++){ binary += String.fromCharCode(bytes[i]); }
      var b64 = btoa(binary);
      var res = await fetch(API + '/api/admin/schools/import-xlsx', {
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body: JSON.stringify({filename:file.name, contentBase64:b64, mode:mode})
      });
      var data = await res.json();
      if(!res.ok){ qs('excel-status').textContent = '上传失败：' + (data.error || '未知错误'); return; }
      if(mode === 'apply'){
        qs('excel-status').textContent = '直接入库完成，更新 ' + data.updated + ' 条';
        loadSchools();
      }else{
        qs('excel-status').textContent = '导入待审核成功：新增 ' + data.created + '，跳过 ' + data.skipped;
        loadQueue();
      }
    }

        method: 'POST',
        headers: {'Content-Type':'application/json'},
        body: JSON.stringify({tierUpdates: updates, renameUpdates: renameUpdates, deleteNames: delNames})

    async function publishOnline(){
      var msg = prompt('请输入本次发布说明', 'chore: publish latest school data');
      if(msg == null) return;
      var url = prompt('请输入线上发布 API 地址', getPublishUrl());
      if(url == null) return;
      url = (url || '').trim();
      if(!url){
        qs('school-status').textContent = '发布失败：API 地址不能为空';
        return;
      }
      var token = getPublishToken();
      if(!token){
        token = prompt('请输入 PUBLISH_TOKEN（仅保存在当前浏览器）', '');
        if(token == null) return;
        token = (token || '').trim();
      }
      if(!token){
        qs('school-status').textContent = '发布失败：缺少 PUBLISH_TOKEN';
        return;
      }
      savePublishConfig(url, token);
      qs('school-status').textContent = '已开始发布任务，正在执行...';
      var res = await fetch(API + '/api/admin/publish-online', {
        method: 'POST',
        headers: {'Content-Type':'application/json'},
        body: JSON.stringify({
          message: msg || 'chore: publish latest school data',
          mode: 'api',
          cloudflareUrl: url,
          publishToken: token
        })
      });
      var data = await res.json();
      if(!res.ok || !data.ok){
        qs('school-status').textContent = '发布失败：' + (data.error || '启动任务失败');
        return;
      }
      publishTaskId = data.taskId || '';
      renderPublishTask(data.task || null);
      if(publishTimer){ clearInterval(publishTimer); publishTimer = null; }
      publishTimer = setInterval(function(){ pollPublishStatus(); }, 1500);
    }

    async function pollPublishStatus(){
      if(!publishTaskId){
        if(publishTimer){ clearInterval(publishTimer); publishTimer = null; }
        return;
      }
      try{
        var res = await fetch(API + '/api/admin/publish-online/status?taskId=' + encodeURIComponent(publishTaskId));
        var data = await res.json();
        if(!res.ok || !data.ok){
          qs('school-status').textContent = '发布状态查询失败：' + (data.error || '未知错误');
          if(publishTimer){ clearInterval(publishTimer); publishTimer = null; }
          return;
        }
        var task = data.task;
        renderPublishTask(task);
        if(task.status === 'success'){
          qs('school-status').textContent = '发布成功：已同步到 Cloudflare D1，线上数据已更新';
          if(publishTimer){ clearInterval(publishTimer); publishTimer = null; }
        }else if(task.status === 'failed'){
          qs('school-status').textContent = '发布失败：' + (task.error || '请查看步骤日志');
          if(publishTimer){ clearInterval(publishTimer); publishTimer = null; }
        }
      }catch(e){
        qs('school-status').textContent = '发布状态查询异常：' + e.message;
        if(publishTimer){ clearInterval(publishTimer); publishTimer = null; }
      }
    }

    function renderPublishTask(task){
      if(!task) return;
      var wrap = qs('publish-wrap');
      var stepsEl = qs('publish-steps');
      var logEl = qs('publish-log');
      wrap.style.display = 'block';
      var steps = task.steps || [];
      stepsEl.innerHTML = steps.map(function(s){
        var icon = '·';
        if(s.status === 'success') icon = '✓';
        else if(s.status === 'running') icon = '…';
        else if(s.status === 'failed') icon = '!';
        var detail = s.detail ? ('（' + esc(s.detail) + '）') : '';
        return '<div class="publish-step ' + esc(s.status || 'pending') + '">'
          + '<span class="publish-dot">' + icon + '</span>'
          + '<span>' + esc(s.label || s.key || '') + detail + '</span>'
          + '</div>';
      }).join('');

      var logs = (task.logs || []).slice(-3).map(function(x){
        var line = '$ ' + (x.cmd || '') + ' -> ' + (x.code == null ? '-' : x.code);
        var out = (x.output || '').trim();
        if(out){
          line += '\n' + out.split('\n').slice(0, 2).join('\n');
        }
        return line;
      });
      logEl.textContent = logs.length ? logs.join('\n\n') : '等待执行日志...';
    }

    async function collectXhs(){
      var raw = qs('xhs-lines').value.trim();
      if(!raw){
        qs('xhs-status').textContent = '请先粘贴至少一行数据';
        return;
      }
      var lines = raw.split(/\r?\n/).map(function(x){ return x.trim(); }).filter(Boolean);
      var items = [];
      for(var i = 0; i < lines.length; i++){
        var parts = lines[i].split(',').map(function(x){ return x.trim(); });
        if(parts.length < 2){
          qs('xhs-status').textContent = '第 ' + (i + 1) + ' 行格式不正确';
          return;
        }
        items.push({
          schoolName: parts[0] || '',
          url: parts[1] || '',
          tier: parts[2] || '',
          admission2025: parts[3] || null,
          maxLottery2025: parts[4] || null,
          note: parts.slice(5).join(',') || ''
        });
      }
      var res = await fetch(API + '/api/admin/xhs/collect-proposals', {
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body: JSON.stringify({purpose: qs('xhs-purpose').value, items: items})
      });
      var data = await res.json();
      if(!res.ok || !data.ok){
        qs('xhs-status').textContent = '抓取失败：' + (data.error || '未知错误');
        return;
      }
      var msg = '已提交 ' + (data.submitted || 0) + ' 条，新增待审核 ' + (data.created || 0) + '，跳过 ' + (data.skipped || 0);
      if(data.errors && data.errors.length){
        msg += '；解析错误 ' + data.errors.length + ' 条';
      }
      qs('xhs-status').textContent = msg;
      await loadQueue();
    }

    qs('btn-filter').onclick = loadSchools;
    qs('btn-prev-page').onclick = function(){ currentPage = Math.max(1, currentPage - 1); renderSchoolPage(); };
    qs('btn-next-page').onclick = function(){ currentPage += 1; renderSchoolPage(); };
    qs('btn-reset').onclick = function(){
      qs('q').value = '';
      qs('f-tier').value = '';
      qs('f-type').value = '';
      qs('f-district').value = '';
      loadSchools();
    };
    qs('btn-clear-tier-edits').onclick = function(){
      pendingTierUpdates = {};
      pendingRenameUpdates = {};
      pendingDeleteNames = {};
      loadSchools();
    };
    qs('btn-push-tier').onclick = pushSchoolChanges;
    qs('btn-publish-online').onclick = publishOnline;
    qs('btn-evidence-collect').onclick = collectSchoolEvidence;
    qs('btn-close-drawer').onclick = closeDrawer;
    qs('detail-mask').onclick = closeDrawer;
    loadSchools();
  </script>
</body>
</html>
